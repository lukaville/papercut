# Configuration for generate_extras_sheet.py
#
# Layers are composited bottom-to-top in the order they appear below.
# For each generated item, every layer is added with its given probability;
# when added, a random variant for that layer is picked from the matching
# files in this directory (grouped by the layer name in the file name,
# e.g. `_0062_background_5.png` -> layer "background").
#
# `constraints` override the per-layer `chance` for the layers they govern:
# one combination is chosen per item using the given weights, and only the
# layers listed in that combination's `include` are turned on.

seed: 42

grid:
  cols: 5
  rows: 7

# Cut lines drawn along the grid, extending `margin` px past the sheet on all sides.
cut_lines:
  width: 2
  margin: 100
  color: [0, 0, 0]
  opacity: 0.8

item_size:
  width: 625
  height: 116

layers:
  - name: balcony
    chance: 1.0
    flip: true
